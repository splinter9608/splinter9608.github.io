# Theme Settings
minimal_mistakes_skin    : "dark"

# Site Settings
locale                   : "ko-KR"
title                    : "Junhyuk's Log"
title_separator          : "-"
subtitle                 : "하면 되든 안되든 결과가 남는다"
name                     : "Jeon Junhyuk"
description              : "PM, 자율주행, 개발, 공부, 커리어 — 과정을 기록합니다."
url                      : "https://splinter9608.github.io"
baseurl                  :
repository               : "splinter9608/splinter9608.github.io"
teaser                   :
logo                     :
masthead_title           :
breadcrumbs              : true
words_per_minute         : 200
enable_copy_code_button  : true

comments:
  provider               : # 나중에 giscus 연결 추천
  giscus:
    repo_id              :
    category_name        :
    category_id          :
    discussion_term      : "pathname"
    reactions_enabled    : "1"
    theme                : "dark"

search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : true

# SEO
google_site_verification :
naver_site_verification  :

# Social Sharing
og_image                 :

# Analytics
analytics:
  provider               : # 나중에 google-gtag 추천
  google:
    tracking_id          :
    anonymize_ip         : true

# Site Author
author:
  name             : "Jeon Junhyuk"
  avatar           :
  bio              : "PM @ 자율주행 농기계 | 과정을 기록합니다"
  location         : "Seoul, South Korea"
  email            : "splinter9608@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:splinter9608@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/splinter9608"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/jhyuk_jeon"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/splinter9608"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/jhyuk_jeon"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: "Asia/Seoul"

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
